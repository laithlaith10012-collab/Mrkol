<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لعبة المحبس وبومب وإكس أو</title>
<style>
body {margin:0; font-family: Arial; background-color: #000; color:#fff; text-align:center;}
.brand {position:absolute; top:20px; left:20px; font-size:50px; font-weight:bold; color:#00ffcc;}
h1 {margin-top:80px; font-size:50px;}
.menu-btn {font-size:50px; padding:20px 60px; margin:30px auto; cursor:pointer; background-color:#00ffcc; color:#000; border:none; border-radius:10px; display:block;}
.back-btn {position:fixed; bottom:20px; right:20px; font-size:24px; padding:10px 20px; background:#00ffcc; color:#000; border:none; border-radius:10px; cursor:pointer; display:none;}
.hands {display:grid; grid-template-columns:repeat(4,200px); gap:40px; justify-content:center; margin-top:50px;}
.hand {font-size:120px; cursor:pointer; position:relative; transition:0.3s;}
.hand.opened { transform: scale(1.2); }
.hand .number {position:absolute; top:-15px; right:-15px; font-size:28px; background:#00ffcc; color:#000; padding:5px 12px; border-radius:12px; font-weight:bold;}
.grid {display:grid; grid-template-columns:repeat(3,150px); grid-template-rows:repeat(3,150px); gap:20px; justify-content:center; margin-top:50px;}
.cell {font-size:80px; background-color:#00ffcc; color:#000; display:flex; justify-content:center; align-items:center; cursor:pointer; border-radius:15px; transition:0.3s;}
.cell:hover {transform: scale(1.05);}
.tic-grid {display:grid; grid-template-columns:repeat(3,150px); grid-template-rows:repeat(3,150px); gap:15px; justify-content:center; margin-top:50px;}
.tic-cell {font-size:80px; background-color:#00ffcc; color:#000; display:flex; justify-content:center; align-items:center; cursor:pointer; border-radius:15px; transition:0.2s;}
.result {margin-top:30px; font-size:40px; font-weight:bold; color:#ff0055;}
.footer {margin-top:80px; font-size:40px; font-weight:bold; color:#fff;}
</style>
</head>
<body>

<div class="brand">Markol games</div>

<!-- القائمة الرئيسية -->
<div id="menu">
  <h1>اختر اللعبة</h1>
  <button class="menu-btn" id="btnHand">محبس</button>
  <button class="menu-btn" id="btnBomb">بومب</button>
  <button class="menu-btn" id="btnTic">إكس أو</button>
</div>

<!-- لعبة المحبس -->
<div id="handGame" style="display:none;">
  <h1>اختر اليد 👇</h1>
  <div class="hands" id="handsContainer"></div>
  <div class="result" id="handResult"></div>
</div>

<!-- لعبة البومب -->
<div id="bombGame" style="display:none;">
  <h1>اختر المربع</h1>
  <div class="grid" id="gridContainer"></div>
</div>

<!-- لعبة إكس أو -->
<div id="ticGame" style="display:none;">
  <h1>إكس أو</h1>
  <div class="result" id="ticTurn">اختيار الإيموجي للاعب الأول</div>
  <div class="tic-grid" id="ticGrid"></div>
  <div class="result" id="ticResult"></div>
</div>

<!-- زر رجوع -->
<button class="back-btn" id="backBtn">رجوع</button>

<div class="footer">TikTok: ll_aa557</div>

<script>
const menu = document.getElementById("menu");
const handGame = document.getElementById("handGame");
const bombGame = document.getElementById("bombGame");
const ticGame = document.getElementById("ticGame");
const backBtn = document.getElementById("backBtn");
const handsContainer = document.getElementById("handsContainer");
const handResult = document.getElementById("handResult");
const gridContainer = document.getElementById("gridContainer");
const ticGrid = document.getElementById("ticGrid");
const ticResult = document.getElementById("ticResult");
const ticTurn = document.getElementById("ticTurn");

// زر الرجوع
backBtn.onclick = () => {
  handGame.style.display = bombGame.style.display = ticGame.style.display = "none";
  menu.style.display = "block";
  backBtn.style.display = "none";
  handsContainer.innerHTML = "";
  handResult.innerText = "";
  gridContainer.innerHTML = "";
  ticGrid.innerHTML = "";
  ticResult.innerText = "";
  ticTurn.innerText = "اختيار الإيموجي للاعب الأول";
};

// الانتقال للألعاب
document.getElementById("btnHand").onclick = () => { menu.style.display="none"; handGame.style.display="block"; backBtn.style.display="block"; startHandGame(); };
document.getElementById("btnBomb").onclick = () => { menu.style.display="none"; bombGame.style.display="block"; backBtn.style.display="block"; startBombGame(); };
document.getElementById("btnTic").onclick = () => { menu.style.display="none"; ticGame.style.display="block"; backBtn.style.display="block"; startTicTacToe(); };

// ==== لعبة المحبس ====
function startHandGame(){
  handsContainer.innerHTML = ""; handResult.innerText="";
  let winning = Math.floor(Math.random()*8);
  for(let i=0;i<8;i++){
    let div=document.createElement("div");
    div.className="hand"; div.innerText="👊";
    let number=document.createElement("div"); number.className="number"; number.innerText=i+1;
    div.appendChild(number);
    div.onclick=()=>{if(div.classList.contains("opened")) return; div.classList.add("opened"); div.innerText="🤚";
      if(i===winning){ setTimeout(()=>{div.innerText="💍"; handResult.innerText="مبروك! اخترت اليد الصحيحة"; },500);}
      else handResult.innerText="حاول مرة أخرى!";
    };
    handsContainer.appendChild(div);
  }
}

// ==== لعبة البومب ====
function startBombGame(){
  gridContainer.innerHTML="";
  const bombIndex = Math.floor(Math.random()*9);
  for(let i=0;i<9;i++){
    const cell = document.createElement("div");
    cell.className="cell";
    cell.dataset.index=i;
    cell.onclick = ()=>{
      if(i===bombIndex){ cell.innerText="💣"; }
      else{ cell.style.visibility="hidden"; }
    };
    gridContainer.appendChild(cell);
  }
}

// ==== لعبة إكس أو ====
function startTicTacToe(){
  ticGrid.innerHTML=""; ticResult.innerText="";
  let board = Array(9).fill(""); let currentPlayer=null; let playerEmojis={X:"❌",O:"⭕"};
  let emojiChoice = prompt("اختر إيموجي للاعب الأول: ❌ أو ⭕","❌");
  if(emojiChoice==="⭕"){playerEmojis.X="⭕";playerEmojis.O="❌";} else {playerEmojis.X="❌";playerEmojis.O="⭕";}
  currentPlayer="X"; ticTurn.innerText="دور اللاعب: "+playerEmojis[currentPlayer];
  for(let i=0;i<9;i++){
    const cell=document.createElement("div"); cell.className="tic-cell"; cell.dataset.index=i;
    cell.onclick = ()=>{
      if(board[i]!=="") return;
      board[i]=currentPlayer; cell.innerText=playerEmojis[currentPlayer];
      if(checkWinner(board,currentPlayer)){ ticResult.innerText="اللاعب "+playerEmojis[currentPlayer]+" فاز!"; return; }
      if(board.every(v=>v!=="")){ ticResult.innerText="تعادل!"; return; }
      currentPlayer=currentPlayer==="X"?"O":"X"; ticTurn.innerText="دور اللاعب: "+playerEmojis[currentPlayer];
    };
    ticGrid.appendChild(cell);
  }
}
function checkWinner(b,p){
  const winComb=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  return winComb.some(c=>c.every(i=>b[i]===p));
}
</script>
</body>
</html>
